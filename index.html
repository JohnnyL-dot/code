<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Seated</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f110e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Seated">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f110e;--surface:#181a16;--surface2:#21241e;--border:rgba(255,255,255,0.08);--text:#f0ede6;--muted:#8a8f84;--accent:#b5e48c;--radius-sm:8px}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh}
  header{padding:16px 20px 12px;padding-top:max(env(safe-area-inset-top),16px);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;flex-shrink:0}
  .logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--accent);letter-spacing:-0.5px}
  .logo span{color:var(--text)}
  #locate-btn{background:var(--accent);border:none;color:var(--bg);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 14px;border-radius:30px;cursor:pointer;white-space:nowrap}
  .filters{padding:10px 16px;display:flex;gap:8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.filters::-webkit-scrollbar{display:none}
  .filter-pill{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:6px 14px;font-size:13px;color:var(--text);white-space:nowrap;flex-shrink:0}
  .filter-pill select{background:none;border:none;color:var(--text);font-family:inherit;font-size:13px;outline:none;cursor:pointer;appearance:none}
  #map{flex:1;min-height:0}
  #gmap{width:100%;height:100%}
  #status-bar{padding:8px 20px;padding-bottom:max(env(safe-area-inset-bottom),8px);background:var(--bg);border-top:1px solid var(--border);font-size:12px;color:var(--muted);text-align:center;flex-shrink:0}
  #nearby-panel{position:fixed;top:130px;left:12px;z-index:50;width:190px;background:rgba(24,26,22,0.93);border:1px solid var(--border);border-radius:14px;padding:10px 12px;backdrop-filter:blur(8px);display:none;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
  #nearby-panel.show{display:block}
  .nearby-title{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px}
  .nearby-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer}
  .nearby-item:last-child{border-bottom:none;padding-bottom:0}
  .nearby-item:active{opacity:0.7}
  .nearby-dot{width:8px;height:8px;border-radius:50%;background:#f4c97a;flex-shrink:0}
  .nearby-info{flex:1;min-width:0}
  .nearby-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nearby-dist{font-size:11px;color:var(--muted)}
  #sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);z-index:100;max-height:78vh;overflow-y:auto;padding-bottom:max(env(safe-area-inset-bottom),16px)}
  #sheet.open{transform:translateY(0)}
  .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
  .sheet-content{padding:16px 20px 20px}
  .sheet-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
  .sheet-name{font-family:'DM Serif Display',serif;font-size:21px;line-height:1.2;flex:1;padding-right:10px}
  .sheet-close{background:var(--surface2);border:none;color:var(--muted);width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .sheet-meta{font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.6}
  .sheet-rating{color:#f4c97a}
  .status-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px;margin-bottom:14px}
  .status-badge.open{background:rgba(58,125,68,0.2);color:#7ecb89}
  .status-badge.closed{background:rgba(139,46,46,0.2);color:#f07878}
  .status-badge.unknown{background:rgba(138,143,132,0.2);color:var(--muted)}
  .status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .open .status-dot{background:#7ecb89}
  .closed .status-dot{background:#f07878}
  .unknown .status-dot{background:var(--muted)}
  .book-section h4{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:10px}
  .book-btns{display:flex;flex-direction:column;gap:8px}
  .book-btn{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;text-decoration:none}
  .book-btn:active{background:#2c3028}
  .book-btn .arrow{color:var(--accent)}
  .gmaps-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;padding:11px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;text-decoration:none}
  #install-banner{display:none;position:fixed;bottom:60px;left:16px;right:16px;background:var(--surface);border:1px solid var(--accent);border-radius:14px;padding:14px 16px;z-index:200;flex-direction:row;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
  #install-banner.show{display:flex}
  .install-text{flex:1;font-size:13px;color:var(--text);line-height:1.4}
  .install-text strong{color:var(--accent);display:block;margin-bottom:2px}
  .install-btn{background:var(--accent);border:none;color:var(--bg);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:8px 14px;border-radius:20px;cursor:pointer}
  .install-dismiss{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px}
  #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:300;transition:opacity 0.4s}
  #loading.hide{opacity:0;pointer-events:none}
  .spinner{width:34px;height:34px;border:2.5px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent)}
  #loading-msg{font-size:13px;color:var(--muted)}
  #toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:13px;padding:8px 16px;border-radius:30px;opacity:0;transition:all 0.3s;z-index:400;white-space:nowrap;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(min-width:480px){
    #sheet{max-width:480px;left:50%;right:auto;width:100%;transform:translateX(-50%) translateY(100%)}
    #sheet.open{transform:translateX(-50%) translateY(0)}
  }
  #fab-locate{position:fixed;bottom:max(env(safe-area-inset-bottom),20px);right:16px;z-index:90;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;transition:transform 0.15s,background 0.2s}
  #fab-locate:active{transform:scale(0.92)}
  #fab-locate.locating{background:#f4c97a;animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 4px 16px rgba(0,0,0,0.5)}50%{box-shadow:0 4px 24px rgba(245,201,122,0.6)}}
  #top-rated-section{margin-top:8px;border-top:1px solid var(--border);padding-top:8px;display:none}
  #top-rated-section.show{display:block}
  #top-rated-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;cursor:pointer;padding:2px 0;margin-top:6px;border-top:1px solid var(--border);padding-top:6px}
  #top-rated-toggle .tr-label{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted)}
  #top-rated-toggle .tr-arrow{font-size:10px;color:var(--muted);transition:transform 0.2s}
  #top-rated-toggle.open .tr-arrow{transform:rotate(180deg)}
  .nearby-rating{font-size:10px;color:#f4c97a}
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Seated</div>
  <div id="loading-msg">Loading map…</div>
</div>
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo">Seat<span>ed</span></div>
      <select id="travel-select" onchange="redrawRoutes()" style="background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;cursor:pointer;appearance:none;">
        <option value="WALKING">🚶 Walk</option>
        <option value="DRIVING">🚗 Drive</option>
      </select>
    </div>
  </header>
  <div class="filters">
    <div class="filter-pill">
      <select id="status-select" onchange="renderMarkers()">
        <option value="all">All restaurants</option>
        <option value="open">Open now</option>
      </select>
    </div>
    <div class="filter-pill" id="pizza-none-btn" style="cursor:pointer" onclick="setPizzaFilter('none')">🚫🍕 No pizza</div>
    <div class="filter-pill" style="cursor:pointer" onclick="clearCache()">
      🔄 Refresh app
    </div>
  </div>
  <div id="map"><div id="gmap"></div></div>
  <div id="status-bar">Tap 📍 to find restaurants near you</div>
</div>
<div id="nearby-panel">
  <div class="nearby-title">⭐ Nearest open</div>
  <div id="nearby-list"></div>
  <button id="top-rated-toggle" onclick="toggleTopRated()">
    <span class="tr-label">★★★ Top rated nearby</span>
    <span class="tr-arrow">▾</span>
  </button>
  <div id="top-rated-section">
    <div id="top-rated-list"></div>
  </div>
</div>
<div id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-content" id="sheet-content"></div>
</div>
<div id="install-banner">
  <div class="install-text"><strong>Add to Home Screen</strong>Use Seated as a native app</div>
  <button class="install-btn" id="install-btn">Install</button>
  <button class="install-dismiss" id="install-dismiss">×</button>
</div>
<div id="toast"></div>
<button id="fab-locate" title="My location">📍</button>

<script>
const API_KEY = 'AIzaSyAYIGLRT3QZW6mg80I9E8cESMw-mtMH79s';
const PLATFORMS = [
  {name:'OpenTable',emoji:'🟠',url:'https://www.opentable.com/s/?restaurantName={name}'},
  {name:'TheFork',emoji:'🟢',url:'https://www.thefork.com/search#query={name}'},
  {name:'Bookatable',emoji:'🔵',url:'https://www.bookatable.com/search?q={name}'},
  {name:'Resy',emoji:'🟣',url:'https://resy.com/?query={name}'},
];

let map, placesService, directionsService, userLatLng;
let allResults = [];
let markerMap = {};
let overlays = [];
let currentTop3 = [];
let top3Walking = [];
let top3Driving = [];
let pizzaFilter = null;
let showTopRated = false;

// PWA
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt(); await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
});
document.getElementById('install-dismiss').addEventListener('click', () =>
  document.getElementById('install-banner').classList.remove('show'));
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// Helpers
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function formatDist(m){return m<1000?Math.round(m)+' m':(m/1000).toFixed(1)+' km';}
function setStatus(t){document.getElementById('status-bar').textContent=t;}
function setMsg(t){document.getElementById('loading-msg').textContent=t;}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}
function travelMode(){
  return document.getElementById('travel-select').value;
}

// Pizza filter
const PIZZA_KEYWORDS = /pizza|pizzeria|pizz/i;
function isPizza(place){
  if(PIZZA_KEYWORDS.test(place.name)) return true;
  if(place.types && place.types.some(t=>PIZZA_KEYWORDS.test(t))) return true;
  return false;
}
function setPizzaFilter(val){
  pizzaFilter = (pizzaFilter === val) ? null : val;
  updatePizzaBtns();
  top3Walking = []; top3Driving = [];
  renderMarkers();
  if(allResults.length > 0){
    const nearest=[...activeResults()].sort((a,b)=>a._dist-b._dist).slice(0,20);
    enrichNext(nearest,0);
  }
}
function updatePizzaBtns(){
  const noneBtn = document.getElementById('pizza-none-btn');
  noneBtn.style.background = pizzaFilter==='none' ? 'var(--accent)' : 'var(--surface2)';
  noneBtn.style.color      = pizzaFilter==='none' ? 'var(--bg)'     : 'var(--text)';
  noneBtn.style.borderColor= pizzaFilter==='none' ? 'var(--accent)' : 'var(--border)';
}
function activeResults(){
  if(pizzaFilter === 'none') return allResults.filter(r=>!isPizza(r));
  return allResults;
}

function svgPin(color,large){
  const sz=large?50:38,r=large?18:14,cx=sz/2,cy=sz/2,fs=large?15:13;
  const ring=large?'<circle cx="'+cx+'" cy="'+cy+'" r="24" fill="none" stroke="#f4c97a" stroke-width="3"/>':'';
  const svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+sz+'" height="'+sz+'">'+ring+'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+color+'" stroke="#0f110e" stroke-width="2"/><text x="'+cx+'" y="'+(cy+5)+'" text-anchor="middle" font-size="'+fs+'">🍽</text></svg>';
  return 'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg);
}

function makeLabelSvg(text, color){
  const w=text.length*7+24;
  const svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="22"><rect width="'+w+'" height="22" rx="11" fill="#181a16" stroke="'+color+'" stroke-width="1.5"/><text x="'+(w/2)+'" y="15" text-anchor="middle" font-size="11" font-family="sans-serif" fill="'+color+'" font-weight="600">'+text+'</text></svg>';
  return {url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg), w};
}

// Load Maps
function loadGoogleMaps(){
  const s=document.createElement('script');
  s.src='https://maps.googleapis.com/maps/api/js?key='+API_KEY+'&libraries=places&callback=onMapsReady';
  s.async=true;s.defer=true;document.head.appendChild(s);
}

function onMapsReady(){
  map=new google.maps.Map(document.getElementById('gmap'),{
    zoom:5,center:{lat:62.0,lng:15.0},
    disableDefaultUI:true,zoomControl:true,gestureHandling:'greedy',
    styles:[
      {elementType:'geometry',stylers:[{color:'#1a1c18'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#8a8f84'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#0f110e'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#2a2e26'}]},
      {featureType:'road.arterial',elementType:'geometry',stylers:[{color:'#333830'}]},
      {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#5a5f54'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#121410'}]},
      {featureType:'poi',stylers:[{visibility:'off'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]},
      {featureType:'landscape',elementType:'geometry',stylers:[{color:'#181a16'}]},
    ]
  });
  placesService = new google.maps.places.PlacesService(map);
  directionsService = new google.maps.DirectionsService();
  map.addListener('click', closeSheet);
  document.getElementById('loading').classList.add('hide');
  setStatus('Tap 📍 to find restaurants near you');
  startLocate();
}

// Geolocation
document.getElementById('fab-locate').addEventListener('click', startLocate);
function startLocate(){
  const fab=document.getElementById('fab-locate');
  fab.classList.add('locating');
  document.getElementById('loading').classList.remove('hide');
  setMsg('Getting your location…');
  if(!navigator.geolocation){
    document.getElementById('loading').classList.add('hide');
    showToast('GPS not supported on this device');
    setStatus('GPS not supported on this device');
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      document.getElementById('fab-locate').classList.remove('locating');
      document.getElementById('fab-locate').textContent='🔄';
      userLatLng={lat:pos.coords.latitude,lng:pos.coords.longitude};
      map.setCenter(userLatLng);map.setZoom(15);
      placeUserPin();searchNearby();
    },
    err=>{
      document.getElementById('fab-locate').classList.remove('locating');
      document.getElementById('loading').classList.add('hide');
      if(err.code===1){
        showToast('Location permission denied — allow in settings');
        setStatus('⚠️ Allow location access and tap 📍 again');
      } else if(err.code===2){
        showToast('Could not get location — try again');
        setStatus('⚠️ Location unavailable — try again');
      } else {
        showToast('Timed out — try again');
        setStatus('⚠️ Location search timed out — try again');
      }
    },
    {timeout:10000, enableHighAccuracy:true}
  );
}
function placeUserPin(){
  new google.maps.Marker({
    position:userLatLng,map,
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:'#5b9cf6',fillOpacity:1,strokeColor:'#fff',strokeWeight:2.5},
    title:'You are here',zIndex:999
  });
}

// Search
function searchNearby(){
  allResults=[];clearAll();
  setMsg('Searching for restaurants…');
  placesService.nearbySearch({
    location:new google.maps.LatLng(userLatLng.lat,userLatLng.lng),
    radius:5000,type:'restaurant'
  },onSearchResults);
}
function onSearchResults(results,status,pagination){
  if(status!==google.maps.places.PlacesServiceStatus.OK){
    document.getElementById('loading').classList.add('hide');
    setStatus('No restaurants found.');return;
  }
  results.forEach(r=>{
    r._dist=haversine(userLatLng.lat,userLatLng.lng,r.geometry.location.lat(),r.geometry.location.lng());
  });
  allResults=allResults.concat(results);
  if(pagination&&pagination.hasNextPage&&allResults.length<60){
    setTimeout(()=>pagination.nextPage(),400);
  } else {
    document.getElementById('loading').classList.add('hide');
    renderMarkers();
    const nearest=[...allResults].sort((a,b)=>a._dist-b._dist).slice(0,20);
    enrichNext(nearest,0);
  }
}

// Enrich opening_hours one by one
function enrichNext(places,i){
  if(i>=places.length){buildNearbyPanel();return;}
  placesService.getDetails({placeId:places[i].place_id,fields:['opening_hours']},(detail,status)=>{
    if(status===google.maps.places.PlacesServiceStatus.OK&&detail&&detail.opening_hours){
      places[i].opening_hours=detail.opening_hours;
      const m=markerMap[places[i].place_id];
      if(m){
        const isOpen=detail.opening_hours.open_now;
        m.setIcon({url:svgPin(isOpen?'#3a7d44':'#7a2e2e',false),scaledSize:new google.maps.Size(38,38),anchor:new google.maps.Point(19,19)});
      }
    }
    setTimeout(()=>enrichNext(places,i+1),150);
  });
}

// Clear overlays only (keep markers)
function clearOverlays(){
  overlays.forEach(o=>o.setMap(null));
  overlays=[];
}

// Clear everything
function clearAll(){
  Object.values(markerMap).forEach(m=>m.setMap(null));markerMap={};
  clearOverlays();
  currentTop3=[];
  top3Walking=[];
  top3Driving=[];
  document.getElementById('nearby-panel').classList.remove('show');
  showTopRated=false;
  const trtog=document.getElementById('top-rated-toggle');if(trtog)trtog.classList.remove('open');
  const trsec=document.getElementById('top-rated-section');if(trsec)trsec.classList.remove('show');
}

// Render all restaurant markers
function renderMarkers(){
  clearAll();closeSheet();
  const onlyOpen=document.getElementById('status-select').value==='open';
  const filtered=activeResults().filter(r=>{
    if(onlyOpen) return r.opening_hours&&r.opening_hours.open_now;
    return true;
  });
  filtered.forEach(place=>{
    const isOpen=place.opening_hours?place.opening_hours.open_now:null;
    const color=isOpen===true?'#3a7d44':isOpen===false?'#7a2e2e':'#3a3d38';
    const m=new google.maps.Marker({
      position:place.geometry.location,map,title:place.name,
      icon:{url:svgPin(color,false),scaledSize:new google.maps.Size(38,38),anchor:new google.maps.Point(19,19)}
    });
    m.addListener('click',()=>fetchDetails(place.place_id,place._dist));
    markerMap[place.place_id]=m;
  });
  const openCount=filtered.filter(r=>r.opening_hours&&r.opening_hours.open_now).length;
  setStatus(filtered.length+' restaurants found · '+openCount+' open now');
}

// Build nearby panel
function buildNearbyPanel(){
  top3Walking = activeResults()
    .filter(r=>r.opening_hours&&r.opening_hours.open_now)
    .sort((a,b)=>a._dist-b._dist)
    .slice(0,3);

  const panel=document.getElementById('nearby-panel');
  if(top3Walking.length===0){panel.classList.remove('show');return;}

  applyTop3(top3Walking);
  panel.classList.add('show');
  drawRoutes();
}

// Set currentTop3 and update marker styles
function applyTop3(top3){
  activeResults().forEach(r=>{
    const m=markerMap[r.place_id];
    if(m){
      const isOpen=r.opening_hours?r.opening_hours.open_now:null;
      const color=isOpen===true?'#3a7d44':isOpen===false?'#7a2e2e':'#3a3d38';
      m.setIcon({url:svgPin(color,false),scaledSize:new google.maps.Size(38,38),anchor:new google.maps.Point(19,19)});
      m.setZIndex(1);
    }
  });
  currentTop3 = top3;
  currentTop3.forEach(r=>{
    const m=markerMap[r.place_id];
    if(m){
      m.setIcon({url:svgPin('#3a7d44',true),scaledSize:new google.maps.Size(50,50),anchor:new google.maps.Point(25,25)});
      m.setZIndex(500);
    }
  });
}

// Called when travel mode changes
function redrawRoutes(){
  const mode = travelMode();
  clearOverlays();
  currentTop3.forEach(r=>{r._routeDist=null;r._routeTime=null;});

  if(mode === 'WALKING'){
    applyTop3(top3Walking);
    refreshNearbyList();
    drawRoutes();
  } else {
    if(top3Driving.length > 0){
      applyTop3(top3Driving);
      refreshNearbyList();
      drawRoutes();
    } else {
      buildDrivingTop3();
    }
  }
}

// Find top 3 by actual driving duration — sequentially to avoid rate limits
function buildDrivingTop3(){
  const candidates = activeResults()
    .filter(r=>r.opening_hours&&r.opening_hours.open_now)
    .sort((a,b)=>a._dist-b._dist)
    .slice(0,15);

  if(candidates.length === 0) return;

  showToast('Calculating driving routes…');
  candidates.forEach(r=>{ r._driveDuration = null; });

  function fetchOne(i){
    if(i >= candidates.length){
      const sorted = candidates.slice().sort((a,b)=>{
        const da = a._driveDuration !== null ? a._driveDuration : 999999;
        const db = b._driveDuration !== null ? b._driveDuration : 999999;
        return da - db;
      });
      top3Driving = sorted.slice(0,3);
      top3Driving.forEach(r=>{ r._routeDist=null; r._routeTime=null; });
      applyTop3(top3Driving);
      refreshNearbyList();
      drawRoutes();
      return;
    }
    directionsService.route({
      origin: userLatLng,
      destination: {lat:candidates[i].geometry.location.lat(), lng:candidates[i].geometry.location.lng()},
      travelMode: google.maps.TravelMode.DRIVING
    }, (result, status) => {
      if(status === google.maps.DirectionsStatus.OK){
        candidates[i]._driveDuration = result.routes[0].legs[0].duration.value;
      }
      setTimeout(()=>fetchOne(i+1), 200);
    });
  }
  fetchOne(0);
}

// Update just the text in nearby panel
function refreshNearbyList(){
  const mode=travelMode();
  const icon=mode==='WALKING'?'🚶':'🚗';
  document.getElementById('nearby-list').innerHTML=currentTop3.map(r=>
    '<div class="nearby-item" onclick="fetchDetails(\''+r.place_id+'\','+r._dist+')">'+
    '<div class="nearby-dot"></div>'+
    '<div class="nearby-info">'+
    '<div class="nearby-name">'+r.name+'</div>'+
    '<div class="nearby-dist">'+(r._routeDist ? icon+' '+r._routeDist+' · '+r._routeTime : formatDist(r._dist)+' away')+'</div>'+
    '</div></div>'
  ).join('');
}

// Draw routes sequentially
function drawRoutes(){
  drawOneRoute(0);
}

function drawOneRoute(i){
  if(i>=currentTop3.length) return;
  const r=currentTop3[i];
  const mode=travelMode();
  const isWalking=(mode==='WALKING');
  const routeColor=isWalking?'#f4c97a':'#7cb9f4';

  directionsService.route({
    origin: userLatLng,
    destination: {lat:r.geometry.location.lat(),lng:r.geometry.location.lng()},
    travelMode: google.maps.TravelMode[mode]
  },(result,status)=>{
    if(status===google.maps.DirectionsStatus.OK){
      const leg=result.routes[0].legs[0];
      r._routeDist=leg.distance.text;
      r._routeTime=leg.duration.text;
      const path=result.routes[0].overview_path;

      const polyOpts={path,strokeColor:routeColor,strokeWeight:3,map};
      if(isWalking){
        polyOpts.strokeOpacity=0;
        polyOpts.icons=[{icon:{path:'M 0,0 0,1',strokeOpacity:1,strokeColor:routeColor,strokeWeight:3,scale:8},offset:'0%',repeat:'20px'}];
      } else {
        polyOpts.strokeOpacity=0.85;
      }
      const line=new google.maps.Polyline(polyOpts);
      overlays.push(line);

      const mid=path[Math.floor(path.length/2)];
      const labelText=leg.distance.text+' · '+leg.duration.text;
      const {url,w}=makeLabelSvg(labelText,routeColor);
      const lm=new google.maps.Marker({
        position:mid,map,clickable:false,zIndex:300,
        icon:{url,scaledSize:new google.maps.Size(w,22),anchor:new google.maps.Point(w/2,11)}
      });
      overlays.push(lm);
      refreshNearbyList();
    }
    setTimeout(()=>drawOneRoute(i+1),300);
  });
}

// Details & sheet
function fetchDetails(placeId,dist){
  placesService.getDetails({
    placeId,fields:['name','rating','user_ratings_total','formatted_address','opening_hours','url','price_level','website']
  },(place,status)=>{
    if(status===google.maps.places.PlacesServiceStatus.OK) openSheet(place,dist);
  });
}
function openSheet(place,dist){
  const isOpen=place.opening_hours?place.opening_hours.open_now:null;
  const sc=isOpen===true?'open':isOpen===false?'closed':'unknown';
  const sl=isOpen===true?'Open now':isOpen===false?'Closed':'Unknown hours';
  const rating=place.rating?'<span class="sheet-rating">★ '+place.rating+'</span> ('+( place.user_ratings_total||'?')+') · ':'';
  const price=place.price_level?'💰'.repeat(place.price_level)+' · ':'';
  const distStr=dist!==undefined?'📍 '+formatDist(dist)+' away · ':'';
  const enc=encodeURIComponent(place.name);
  const btns=PLATFORMS.map(p=>'<a class="book-btn" href="'+p.url.replace('{name}',enc)+'" target="_blank" rel="noopener"><span>'+p.emoji+'&nbsp;'+p.name+'</span><span class="arrow">→</span></a>').join('');
  const websiteBtn=place.website?'<a class="gmaps-btn" href="'+place.website+'" target="_blank" rel="noopener">🌐 The restaurant\'s website</a>':'';
  const gmapsUrl=place.url||'https://maps.google.com/?q='+enc;
  document.getElementById('sheet-content').innerHTML=
    '<div class="sheet-header"><div class="sheet-name">'+place.name+'</div><button class="sheet-close" onclick="closeSheet()">×</button></div>'+
    '<div class="sheet-meta">'+distStr+rating+price+(place.formatted_address||'')+'</div>'+
    '<div class="status-badge '+sc+'"><div class="status-dot"></div>'+sl+'</div>'+
    '<div class="book-section"><h4>Book via</h4><div class="book-btns">'+btns+'</div></div>'+
    websiteBtn+
    '<a class="gmaps-btn" href="'+gmapsUrl+'" target="_blank" rel="noopener">🗺 Directions in Google Maps</a>';
  document.getElementById('sheet').classList.add('open');
}
function closeSheet(){document.getElementById('sheet').classList.remove('open');}
const sheet=document.getElementById('sheet');
let ty=0;
sheet.addEventListener('touchstart',e=>{ty=e.touches[0].clientY;},{passive:true});
sheet.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-ty>60)closeSheet();},{passive:true});

// Clear service worker cache and reload
function clearCache(){
  if('serviceWorker' in navigator && 'caches' in window){
    caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).then(()=>{
      showToast('Cache cleared — reloading…');
      setTimeout(()=>window.location.reload(true),1000);
    });
  } else {
    window.location.reload(true);
  }
}

// Top rated panel
function toggleTopRated(){
  showTopRated = !showTopRated;
  const btn = document.getElementById('top-rated-toggle');
  const section = document.getElementById('top-rated-section');
  btn.classList.toggle('open', showTopRated);
  section.classList.toggle('show', showTopRated);
  if(showTopRated) buildTopRatedList();
}

function buildTopRatedList(){
  const active = activeResults().filter(r => r.rating && r.rating >= 3);
  const top = active.sort((a,b) => (b.rating||0)-(a.rating||0) || a._dist-b._dist).slice(0,3);
  if(top.length === 0){
    document.getElementById('top-rated-list').innerHTML = '<div style="font-size:11px;color:var(--muted);padding:4px 0">No rated results found</div>';
    return;
  }
  function openStatus(r){
    if(!r.opening_hours) return '';
    return r.opening_hours.open_now
      ? ' · <span style="color:#7ecb89">Open</span>'
      : ' · <span style="color:#f07878">Closed</span>';
  }
  document.getElementById('top-rated-list').innerHTML = top.map(r =>
    '<div class="nearby-item" onclick="fetchDetails(\''+r.place_id+'\','+r._dist+')">' +
    '<div class="nearby-dot" style="background:#f4c97a"></div>' +
    '<div class="nearby-info">' +
    '<div class="nearby-name">'+r.name+'</div>' +
    '<div class="nearby-dist"><span class="nearby-rating">★ '+r.rating+'</span> · '+formatDist(r._dist)+' away'+openStatus(r)+'</div>' +
    '</div></div>'
  ).join('');
}

loadGoogleMaps();
</script>
